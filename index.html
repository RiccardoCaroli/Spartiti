<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spartito">
<meta name="theme-color" content="#7F77DD">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Editor Spartito</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}button,select,input{touch-action:manipulation;}
body{font-family:system-ui,sans-serif;background:#f0efe9;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:pan-x pan-y;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:5px;padding:6px 8px;border-bottom:1px solid #ddd;background:#fff;flex-wrap:wrap;}
#sname{flex:1;min-width:100px;font-size:13px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;outline:none;}
#sname:focus{border-color:#7F77DD;}
.tsig{font-size:13px;padding:5px 6px;border:1px solid #ccc;border-radius:8px;background:#fff;outline:none;}
.tb{display:flex;align-items:center;gap:4px;padding:6px 10px;font-size:12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.tb.on{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}
.sep{width:1px;height:20px;background:#e0e0e0;margin:0 1px;flex-shrink:0;}

/* TABS */
#tabbar{display:flex;border-bottom:1px solid #ddd;background:#fafaf8;}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#999;}
.tab.active{color:#3C3489;border-bottom-color:#7F77DD;font-weight:600;}

/* CHIPS */
#chips{display:flex;flex-wrap:wrap;gap:5px;padding:5px 8px;border-bottom:1px solid #eee;background:#fafaf9;min-height:34px;}
.chip{padding:4px 10px;font-size:11px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#444;cursor:pointer;display:flex;align-items:center;gap:4px;}
.chip.active{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}
.chip .xc{font-size:10px;color:#ccc;}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;}

/* PALETTE */
#pal{width:88px;min-width:88px;border-right:1px solid #ddd;background:#fafaf8;display:flex;flex-direction:column;overflow-y:auto;padding:4px 4px;gap:2px;-webkit-overflow-scrolling:touch;}
.ps{font-size:8px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;padding:6px 4px 2px;}
.pb{width:100%;padding:7px 3px;border:1px solid transparent;border-radius:7px;background:transparent;cursor:pointer;color:#222;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-tap-highlight-color:transparent;}
.pb:active{background:#f0f0f0;}
.pb.active{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}
.pb svg{display:block;width:26px;height:28px;}
.pb .pl{display:block;font-size:8px;line-height:1.2;color:#aaa;}
.pb.active .pl{color:#534AB7;}
.pb .pk{position:absolute;top:2px;right:3px;font-size:6px;color:#ccc;font-family:monospace;}

/* SCORE WRAP */
#sw{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* TRANSPORT */
#transport{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid #ddd;background:#fafaf8;flex-wrap:wrap;}
.tr{display:flex;align-items:center;gap:4px;padding:7px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tr.on{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}
.tr.rec-on{background:#E24B4A;border-color:#C0392B;color:#fff;}
.tr.play-on{background:#27AE60;border-color:#219150;color:#fff;}
.tr i{font-size:16px;}
#metro-dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:background .05s;flex-shrink:0;}
#metro-dot.beat{background:#7F77DD;}
#metro-dot.accent{background:#E24B4A;}
#bpm-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;}
#bpm-wrap input{width:80px;accent-color:#7F77DD;}
#bpm-num{font-family:monospace;font-weight:600;min-width:32px;}
#transp-wrap{display:flex;align-items:center;gap:5px;font-size:12px;color:#555;margin-left:auto;}
#transp-wrap button{padding:5px 9px;font-size:14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;min-width:30px;}
#tv{font-family:monospace;font-weight:600;min-width:38px;text-align:center;font-size:12px;color:#534AB7;}

/* SCORE CANVAS */
#sa{flex:1;overflow:auto;background:#fff;-webkit-overflow-scrolling:touch;}
canvas{display:block;touch-action:none;}

/* PIANO */
#pw{border-top:1px solid #444;background:#1a1a2e;padding:10px 10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;display:none;}
#pw.show{display:block;}
#piano{display:flex;position:relative;height:110px;gap:0;}
.wk{width:48px;height:110px;border:1px solid #666;border-radius:0 0 5px 5px;background:linear-gradient(to bottom,#f8f8f8,#ddd);cursor:pointer;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.wk:active,.wk.pr{background:#d0cfff;}
.wk .wl{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:9px;color:#888;white-space:nowrap;text-align:center;pointer-events:none;}
.wk .wl.did{color:#534AB7;font-weight:700;}
.bk{width:30px;height:68px;background:linear-gradient(to bottom,#111,#333);border:1px solid #000;border-radius:0 0 4px 4px;cursor:pointer;position:absolute;top:0;z-index:2;-webkit-tap-highlight-color:transparent;}
.bk:active,.bk.pr{background:#7F77DD;}
.oct-sep{width:2px;background:#444;height:110px;flex-shrink:0;}

/* KEYBOARD INPUT BUTTON */
#kb-btn{display:flex;align-items:center;gap:4px;padding:7px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;}
#kb-btn.on{background:#EEEDFE;border-color:#7F77DD;color:#3C3489;}

/* KEYBOARD OVERLAY - visible input for iOS */
#kb-bar{display:none;background:#1a1a2e;border-top:1px solid #444;padding:8px 12px;align-items:center;gap:10px;flex-shrink:0;}
#kb-bar.show{display:flex;}
#kb-input{flex:1;font-size:16px;padding:8px 12px;border:1px solid #7F77DD;border-radius:8px;background:#fff;outline:none;color:#222;}
.kb-info{font-size:11px;color:#aaa;line-height:1.5;}

/* SETLIST */
#slp{flex:1;overflow:auto;padding:14px;display:none;flex-direction:column;gap:10px;background:#fff;}
#slp.vis{display:flex;}
.sl-hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.sl-hd h2{font-size:14px;font-weight:500;}
.sl-add{display:flex;align-items:center;gap:4px;padding:6px 12px;font-size:12px;border:1px solid #7F77DD;border-radius:8px;background:#EEEDFE;color:#3C3489;cursor:pointer;}
#sl-ni{font-size:13px;padding:6px 9px;border:1px solid #ccc;border-radius:8px;outline:none;min-width:140px;}
#slc{display:flex;flex-direction:column;gap:14px;}
.slcard{border:1px solid #ddd;border-radius:10px;overflow:hidden;}
.slch{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fafaf8;border-bottom:1px solid #eee;}
.slct{flex:1;font-size:13px;font-weight:500;outline:none;border:none;background:transparent;}
.slxb{font-size:13px;color:#ccc;cursor:pointer;padding:2px 6px;}
.slit{padding:6px 0;}
.slrow{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:grab;}
.slrow.drag-over{background:#EEEDFE;}
.slnum{font-size:11px;color:#bbb;font-family:monospace;min-width:20px;}
.slnm{flex:1;font-size:13px;color:#333;}
.slop{font-size:11px;padding:4px 8px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;}
.slix{font-size:12px;color:#ddd;cursor:pointer;padding:2px 5px;}
.slar{padding:6px 12px 10px;display:flex;gap:7px;align-items:center;}
.slsel{font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px;background:#fff;outline:none;max-width:200px;}

/* ARCHIVE MODAL */
#arc{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
#arc.show{display:flex;}
#arc-box{background:#fff;border-radius:14px;padding:20px;max-width:340px;width:90%;display:flex;flex-direction:column;gap:12px;}
#arc-box h3{font-size:14px;font-weight:500;}
.arc-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid #ddd;border-radius:10px;background:#fafaf8;cursor:pointer;font-size:13px;}
.arc-btn:active{background:#EEEDFE;}
.arc-btn i{font-size:18px;color:#7F77DD;}
.arc-close{align-self:flex-end;font-size:13px;color:#aaa;cursor:pointer;padding:4px 8px;}

/* STATUS */
#stbar{padding:3px 9px;border-top:1px solid #ddd;font-size:11px;color:#999;display:flex;justify-content:space-between;background:#fafaf8;flex-wrap:wrap;gap:3px;}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <input type="text" id="sname" placeholder="Nome spartito" value="Spartito 1"/>
  <select id="tsig" class="tsig">
    <option>4/4</option><option>3/4</option><option>6/8</option><option>2/4</option>
  </select>
  <div class="sep"></div>
  <button class="tb on" id="btn-did"><i class="ti ti-book"></i> Didattica</button>
  <div class="sep"></div>
  <button class="tb" id="btn-undo"><i class="ti ti-arrow-back-up"></i></button>
  <button class="tb" id="btn-clear"><i class="ti ti-trash"></i></button>
  <div class="sep"></div>
  <button class="tb" id="btn-new"><i class="ti ti-plus"></i> Nuovo</button>
  <button class="tb" id="btn-save"><i class="ti ti-device-floppy"></i> Salva</button>
  <button class="tb" id="btn-pdf"><i class="ti ti-file-type-pdf"></i> PDF</button>
  <button class="tb" id="btn-arc"><i class="ti ti-database-export"></i> Archivio</button>
  <button class="tb" id="btn-annot-top"><i class="ti ti-message-plus"></i> Annota</button>
</div>

<!-- TABS -->
<div id="tabbar">
  <div class="tab active" data-tab="editor">✍️ Editor</div>
  <div class="tab" data-tab="setlist">📋 Scaletta</div>
</div>

<!-- CHIPS -->
<div id="chips"></div>

<!-- MAIN -->
<div id="main">

  <!-- PALETTE -->
  <div id="pal">
    <div class="ps">Durata</div>
    <button class="pb" data-a="dur" data-v="whole">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="13" cy="20" rx="9" ry="5.5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span class="pl">Semibreve</span><span class="pk">1</span>
    </button>
    <button class="pb" data-a="dur" data-v="half">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="11" cy="22" rx="8" ry="5" stroke="currentColor" stroke-width="2" fill="none" transform="rotate(-15 11 22)"/><line x1="19" y1="22" x2="19" y2="4" stroke="currentColor" stroke-width="2"/></svg>
      <span class="pl">Minima</span><span class="pk">2</span>
    </button>
    <button class="pb active" data-a="dur" data-v="quarter">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="11" cy="22" rx="8" ry="5" fill="currentColor" transform="rotate(-15 11 22)"/><line x1="19" y1="22" x2="19" y2="4" stroke="currentColor" stroke-width="2"/></svg>
      <span class="pl">Semiminima</span><span class="pk">4</span>
    </button>
    <button class="pb" data-a="dur" data-v="eighth">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="11" cy="22" rx="8" ry="5" fill="currentColor" transform="rotate(-15 11 22)"/><line x1="19" y1="22" x2="19" y2="4" stroke="currentColor" stroke-width="2"/><path d="M19 4 Q27 9 20 17" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span class="pl">Croma</span><span class="pk">8</span>
    </button>
    <button class="pb" data-a="dur" data-v="sixteenth">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="11" cy="22" rx="8" ry="5" fill="currentColor" transform="rotate(-15 11 22)"/><line x1="19" y1="22" x2="19" y2="3" stroke="currentColor" stroke-width="2"/><path d="M19 3 Q27 8 20 15" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19 10 Q27 15 20 22" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span class="pl">Semicroma</span><span class="pk">6</span>
    </button>
    <button class="pb" data-a="dur" data-v="dotted_quarter">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="10" cy="22" rx="7" ry="4.5" fill="currentColor" transform="rotate(-15 10 22)"/><line x1="17" y1="22" x2="17" y2="5" stroke="currentColor" stroke-width="2"/><circle cx="22" cy="20" r="2.5" fill="currentColor"/></svg>
      <span class="pl">Puntata</span>
    </button>
    <button class="pb" data-a="dur" data-v="dotted_eighth">
      <svg viewBox="0 0 26 28" fill="currentColor"><ellipse cx="10" cy="22" rx="7" ry="4.5" fill="currentColor" transform="rotate(-15 10 22)"/><line x1="17" y1="22" x2="17" y2="5" stroke="currentColor" stroke-width="2"/><path d="M17 5 Q25 10 18 17" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="22" cy="20" r="2.5" fill="currentColor"/></svg>
      <span class="pl">Cr. puntata</span>
    </button>

    <div class="ps">Pause</div>
    <button class="pb" data-a="rest" data-v="whole">
      <svg viewBox="0 0 26 28" fill="currentColor"><rect x="5" y="11" width="16" height="6" fill="currentColor"/><line x1="3" y1="11" x2="23" y2="11" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="pl">P. intera</span>
    </button>
    <button class="pb" data-a="rest" data-v="half">
      <svg viewBox="0 0 26 28" fill="currentColor"><rect x="5" y="14" width="16" height="6" fill="currentColor"/><line x1="3" y1="20" x2="23" y2="20" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="pl">P. minima</span>
    </button>
    <button class="pb" data-a="rest" data-v="quarter">
      <svg viewBox="0 0 26 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3 L9 10 L16 14 L8 25"/></svg>
      <span class="pl">P. semi.</span><span class="pk">R</span>
    </button>
    <button class="pb" data-a="rest" data-v="eighth">
      <svg viewBox="0 0 26 28" fill="currentColor"><circle cx="16" cy="8" r="3"/><path d="M16 10 Q18 15 15 18 L11 26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      <span class="pl">P. croma</span>
    </button>
    <button class="pb" data-a="rest" data-v="sixteenth">
      <svg viewBox="0 0 26 28" fill="currentColor"><circle cx="17" cy="6" r="2.5"/><circle cx="15" cy="14" r="2.5"/><path d="M17 8 Q20 11 17 14 Q14 17 16 21 L12 27" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      <span class="pl">P. semicroma</span>
    </button>

    <div class="ps">Alter.</div>
    <button class="pb" data-a="acc" data-v="#">
      <svg viewBox="0 0 26 28" fill="currentColor" stroke="currentColor"><line x1="9" y1="4" x2="9" y2="24" stroke-width="2"/><line x1="17" y1="4" x2="17" y2="24" stroke-width="2"/><line x1="6" y1="9" x2="20" y2="7" stroke-width="2.5"/><line x1="6" y1="17" x2="20" y2="15" stroke-width="2.5"/></svg>
      <span class="pl">Diesis</span><span class="pk">S</span>
    </button>
    <button class="pb" data-a="acc" data-v="b">
      <svg viewBox="0 0 26 28" fill="currentColor"><line x1="8" y1="3" x2="8" y2="25" stroke="currentColor" stroke-width="2"/><path d="M8 14 Q20 11 20 18 Q20 25 8 22 Z" fill="currentColor"/></svg>
      <span class="pl">Bemolle</span><span class="pk">B</span>
    </button>
    <button class="pb" data-a="acc" data-v="n">
      <svg viewBox="0 0 26 28" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="5" x2="8" y2="23"/><line x1="18" y1="5" x2="18" y2="23"/><line x1="8" y1="10" x2="18" y2="8"/><line x1="8" y1="20" x2="18" y2="18"/></svg>
      <span class="pl">Bequadro</span>
    </button>

    <div class="ps">Expr.</div>
    <button class="pb" data-a="slur">
      <svg viewBox="0 0 26 18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 4 Q13 18 24 4"/></svg>
      <span class="pl">Legato</span><span class="pk">L</span>
    </button>
    <button class="pb" data-a="tie">
      <svg viewBox="0 0 26 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="4 3"><path d="M2 14 Q13 0 24 14"/></svg>
      <span class="pl">Legatura</span><span class="pk">T</span>
    </button>
    <button class="pb" data-a="dyn" data-v="p"><span style="font-size:18px;font-style:italic;font-family:serif">p</span><span class="pl">Piano</span></button>
    <button class="pb" data-a="dyn" data-v="f"><span style="font-size:18px;font-style:italic;font-family:serif">f</span><span class="pl">Forte</span></button>
    <button class="pb" data-a="dyn" data-v="mf"><span style="font-size:14px;font-style:italic;font-family:serif">mf</span><span class="pl">M.forte</span></button>
    <button class="pb" data-a="dyn" data-v="mp"><span style="font-size:14px;font-style:italic;font-family:serif">mp</span><span class="pl">M.piano</span></button>
    <button class="pb" data-a="dyn" data-v="pp"><span style="font-size:14px;font-style:italic;font-family:serif">pp</span><span class="pl">Pianiss.</span></button>
    <button class="pb" data-a="dyn" data-v="ff"><span style="font-size:14px;font-style:italic;font-family:serif">ff</span><span class="pl">Fortiss.</span></button>

    <div class="ps">Testo</div>
    <button class="pb" data-a="annot" data-v="above">
      <svg viewBox="0 0 26 28" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="22" x2="22" y2="22"/><line x1="4" y1="16" x2="16" y2="16"/><line x1="13" y1="6" x2="13" y2="14" stroke-width="1.5"/><path d="M9 10 L13 5 L17 10" stroke-width="1.5"/></svg>
      <span class="pl">Nota sopra</span>
    </button>
    <button class="pb" data-a="annot" data-v="chord">
      <svg viewBox="0 0 26 28" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="22" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="13" y1="14" x2="13" y2="22" stroke-width="1.5"/><path d="M9 18 L13 23 L17 18" stroke-width="1.5"/></svg>
      <span class="pl">Accordo sotto</span>
    </button>

    <div class="ps">Chiavi</div>
    <button class="pb" data-a="clef" data-v="treble">
      <svg viewBox="0 0 26 40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M13 38 Q6 32 8 24 Q10 16 18 12 Q22 8 20 3 Q18 0 14 2 Q10 4 11 10 Q12 18 14 26 Q16 34 13 38Z"/><path d="M8 20 Q14 18 18 22 Q22 26 16 28 Q10 30 8 26"/></svg>
      <span class="pl">Violino</span>
    </button>
    <button class="pb" data-a="clef" data-v="bass">
      <svg viewBox="0 0 26 28" fill="currentColor"><path d="M5 6 Q5 22 12 22 Q18 22 18 16 Q18 10 12 10 Q9 10 8 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="21" cy="8" r="2.5"/><circle cx="21" cy="14" r="2.5"/></svg>
      <span class="pl">Basso</span>
    </button>
  </div>

  <!-- SCORE + TRANSPORT -->
  <div id="sw">
    <!-- TRANSPORT -->
    <div id="transport">
      <button class="tr" id="btn-rec"><i class="ti ti-record-mail"></i></button>
      <button class="tr" id="btn-play"><i class="ti ti-player-play"></i></button>
      <button class="tr" id="btn-stop"><i class="ti ti-player-stop"></i></button>
      <button class="tr" id="btn-metro"><i class="ti ti-metronome"></i> Metro</button>
      <div id="metro-dot"></div>
      <div class="sep"></div>
      <div id="bpm-wrap">
        BPM <input type="range" id="bpm-slider" min="40" max="220" value="80">
        <span id="bpm-num">80</span>
      </div>
      <div class="sep"></div>
      <button class="tr" id="btn-piano"><i class="ti ti-piano"></i> Tastiera</button>
      <button id="kb-btn" class="tr"><i class="ti ti-keyboard"></i> QWERTY</button>
      <div id="transp-wrap">
        Trasp. <button id="tr-dn">−</button>
        <span id="tv">0 st</span>
        <button id="tr-up">+</button>
        <button id="tr-reset" style="font-size:10px;padding:5px 7px">Reset</button>
      </div>
    </div>

    <!-- SCORE -->
    <div id="sa"><canvas id="cv"></canvas></div>

    <!-- PIANO KEYBOARD -->
    <div id="pw"><div id="piano"></div></div>

    <!-- QWERTY BAR -->
    <div id="kb-bar">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
'use strict';
try { if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js'); } catch(e) {}

// ═══════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════
const CV = document.getElementById('cv');
const CTX = CV.getContext('2d');
const SA = document.getElementById('sa');

const SG = 11;        // staff gap (px between staff lines)
const CW = 38;        // clef width
const TW = 22;        // time sig width
const LP = 14;        // left padding
const ST0 = 72;       // first staff top Y
const RH = 120;       // row height (base, didactic adds extra)

const DB = { whole:4, half:2, quarter:1, eighth:.5, sixteenth:.25, dotted_quarter:1.5, dotted_eighth:.75 };
const DN = { whole:'Semibreve', half:'Minima', quarter:'Semiminima', eighth:'Croma', sixteenth:'Semicroma', dotted_quarter:'Sm.puntata', dotted_eighth:'Cr.puntata' };
const DC = ['whole','half','quarter','eighth','sixteenth'];
const NS = { C:0, D:1, E:2, F:3, G:4, A:5, B:6 };
const NI = { C:'Do', D:'Re', E:'Mi', F:'Fa', G:'Sol', A:'La', B:'Si' };
const AI = { '#':'♯', b:'♭', n:'♮' };

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S = { notes:[], duration:'quarter', octave:4, accidental:null, pendingDyn:null,
          slurStart:null, tieStart:null, clef:'treble', timeSig:'4/4', scoreName:'Spartito 1' };
let scores = {}, setlists = {}, scoreId = null;
let hist = [], ghost = null, selI = null, delB = null;
let didactic = true, transpOff = 0;
let lcI = -1, lcT = 0;

// Annotations: {id, text, x, y, type:'above'|'below'|'chord', noteIdx:-1|N}
let annotations = [];
let editingAnnotation = null; // id of annotation being edited
const DBL = 380;

// Drag state
let dragIdx = -1;
let dragStartY = 0;
let dragLastStep = -1;
let dragMoved = false;
const DRAG_THRESHOLD = 28;

let dragSnapY = 0;  // Y position at last accepted pitch snap
// Long press state
let lpTimer = null;
let lpIdx = -1;
const LP_MS = 600;  // ms to trigger long press

function cancelLP() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  lpIdx = -1;
  // remove highlight if any
  if (lpHighlight >= 0) { lpHighlight = -1; render(); }
}
let lpHighlight = -1; // index of note being held (for visual feedback)

// ═══════════════════════════════════
// AUDIO
// ═══════════════════════════════════
let AC = null;
let acMaster = null; // master gain + compressor chain

function getAC() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    // Master chain: gain → compressor → destination
    // The compressor is required on iOS to actually push signal through
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -6;
    comp.knee.value = 6;
    comp.ratio.value = 3;
    comp.attack.value = 0.003;
    comp.release.value = 0.1;
    acMaster = AC.createGain();
    acMaster.gain.value = 1.8; // boost overall volume
    acMaster.connect(comp);
    comp.connect(AC.destination);
  }
  // iOS requires resume() inside a user gesture — we call it everywhere
  if (AC.state === 'suspended') {
    AC.resume().catch(() => {});
  }
  return AC;
}

// Unlock AudioContext on first user touch (iOS requirement)
function unlockAudio() {
  if (!AC) return;
  if (AC.state === 'suspended') AC.resume().catch(() => {});
  // Play a silent buffer to fully unlock
  const buf = AC.createBuffer(1, 1, 22050);
  const src = AC.createBufferSource();
  src.buffer = buf;
  src.connect(AC.destination);
  src.start(0);
}
document.addEventListener('touchstart', unlockAudio, {once: true, passive: true});
document.addEventListener('mousedown', unlockAudio, {once: true, passive: true});

function playNote(midi, dur) {
  try {
    const ac = getAC();
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    const t = ac.currentTime;

    // Two oscillators for richer tone
    const osc1 = ac.createOscillator();
    const osc2 = ac.createOscillator();
    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2; // one octave up (shimmer)

    const g1 = ac.createGain();
    const g2 = ac.createGain();
    g1.gain.value = 0.8;
    g2.gain.value = 0.15;

    // Envelope on a mixer gain
    const env = ac.createGain();
    const d = Math.max(dur || 0.5, 0.08);
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(1.0, t + 0.008); // fast attack
    env.gain.exponentialRampToValueAtTime(0.55, t + 0.06); // decay
    env.gain.exponentialRampToValueAtTime(0.001, t + d);   // release

    // Low-pass for warmth
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = Math.min(5000, freq * 9);
    lp.Q.value = 0.4;

    osc1.connect(g1); osc2.connect(g2);
    g1.connect(lp); g2.connect(lp);
    lp.connect(env);
    env.connect(acMaster);

    osc1.start(t); osc2.start(t);
    osc1.stop(t + d + 0.05);
    osc2.stop(t + d + 0.05);
  } catch(e) { console.warn('playNote error:', e); }
}

function click(accent) {
  try {
    const ac = getAC(), t = ac.currentTime;
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = accent ? 1400 : 900;
    g.gain.setValueAtTime(accent ? 0.6 : 0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.045);
    osc.connect(g);
    g.connect(acMaster);
    osc.start(t); osc.stop(t + 0.05);
  } catch(e) {}
}

// ═══════════════════════════════════
// METRONOME
// ═══════════════════════════════════
let bpm = 80, metroOn = false, metroTimer = null, beatN = 0;

function beatsInBar() { return parseInt(S.timeSig.split('/')[0]); }
function bpb() { const [n,d] = S.timeSig.split('/').map(Number); return n*(4/d); }

function startMetro() {
  stopMetro();
  beatN = 0;
  metroTimer = setInterval(() => {
    const acc = (beatN % beatsInBar()) === 0;
    click(acc);
    const dot = document.getElementById('metro-dot');
    dot.className = acc ? 'accent' : 'beat';
    setTimeout(() => dot.className = '', 80);
    beatN++;
  }, 60000 / bpm);
}
function stopMetro() {
  if (metroTimer) { clearInterval(metroTimer); metroTimer = null; }
  beatN = 0;
  document.getElementById('metro-dot').className = '';
}

document.getElementById('btn-metro').addEventListener('click', () => {
  metroOn = !metroOn;
  document.getElementById('btn-metro').classList.toggle('on', metroOn);
  if (metroOn) startMetro(); else stopMetro();
});

const bpmSlider = document.getElementById('bpm-slider');
bpmSlider.addEventListener('input', () => {
  bpm = parseInt(bpmSlider.value);
  document.getElementById('bpm-num').textContent = bpm;
  if (metroOn) { stopMetro(); startMetro(); }
  if (isRec) { stopRec(); startRec(); }
  if (isPlay) stopPlay();
});

// ═══════════════════════════════════
// RECORDING
// ═══════════════════════════════════
let isRec = false, recTimer = null, recEvents = [], recT0 = 0;

function startRec() {
  getAC();
  isRec = true;
  recEvents = [];
  beatN = 0;
  recT0 = performance.now();
  recTimer = setInterval(() => {
    const acc = (beatN % beatsInBar()) === 0;
    click(acc);
    const dot = document.getElementById('metro-dot');
    dot.className = acc ? 'accent' : 'beat';
    setTimeout(() => dot.className = '', 80);
    beatN++;
  }, 60000 / bpm);
  document.getElementById('btn-rec').classList.add('rec-on');
  ss('● REC — suona sulla tastiera piano · tocca di nuovo per fermare');
}

function stopRec() {
  isRec = false;
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  document.getElementById('btn-rec').classList.remove('rec-on');
  document.getElementById('metro-dot').className = '';
  if (recEvents.length > 0) quantize();
  ss('Registrazione terminata — ' + recEvents.length + ' note');
}

function quantize() {
  const gridMs = (60000 / bpm) * (DB[S.duration] || 1);
  hist.push(JSON.stringify(S.notes));
  recEvents.forEach(ev => {
    const { name, octave, accidental } = midi2note(ev.midi);
    S.notes.push({ type:'note', name, octave, duration:S.duration,
      accidental, dynamic:null, slur:null, tie:null });
  });
  render(); ur();
}

function midi2note(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const octave = Math.floor(midi / 12) - 1;
  const raw = names[midi % 12];
  if (raw.length === 2) return { name:raw[0], octave, accidental:'#' };
  return { name:raw, octave, accidental:null };
}

document.getElementById('btn-rec').addEventListener('click', () => {
  getAC();
  if (isRec) stopRec(); else { if (isPlay) stopPlay(); startRec(); }
});

// ═══════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════
let isPlay = false, playTimer = null, playIdx = 0, playHL = -1;

function noteToMidi(name, octave, accidental) {
  const base = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  let m = (octave + 1) * 12 + base[name];
  if (accidental === '#') m++;
  if (accidental === 'b') m--;
  return m + transpOff;
}

function startPlay() {
  if (isPlay) stopPlay();
  if (isRec) stopRec();
  isPlay = true;
  playIdx = 0;
  beatN = 0;
  document.getElementById('btn-play').classList.add('play-on');
  document.getElementById('btn-play').querySelector('i').className = 'ti ti-player-pause';
  ss('▶ Playback…');
  schedPlay();
}
function schedPlay() {
  if (!isPlay) return;
  if (playIdx >= S.notes.length) { stopPlay(); ss('Fine'); return; }
  const n = S.notes[playIdx];
  const durMs = (60000 / bpm) * (DB[n.duration] || 1);
  if (n.type !== 'rest') {
    const midi = noteToMidi(n.name, n.octave, n.accidental);
    playNote(midi, durMs / 1000 * 0.88);
  }
  const acc = (beatN % beatsInBar()) === 0;
  click(acc);
  const dot = document.getElementById('metro-dot');
  dot.className = acc ? 'accent' : 'beat';
  setTimeout(() => dot.className = '', 80);
  beatN++;
  playHL = playIdx;
  render();
  playIdx++;
  playTimer = setTimeout(schedPlay, durMs);
}
function stopPlay() {
  isPlay = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  playHL = -1;
  document.getElementById('btn-play').classList.remove('play-on');
  document.getElementById('btn-play').querySelector('i').className = 'ti ti-player-play';
  document.getElementById('metro-dot').className = '';
  render();
}

document.getElementById('btn-play').addEventListener('click', () => {
  getAC();
  if (isPlay) stopPlay(); else startPlay();
});
document.getElementById('btn-stop').addEventListener('click', () => {
  stopPlay(); stopRec(); stopMetro();
  metroOn = false;
  document.getElementById('btn-metro').classList.remove('on');
});

// ═══════════════════════════════════
// TRANSPOSE
// ═══════════════════════════════════
function updTransp() {
  document.getElementById('tv').textContent = (transpOff > 0 ? '+' : '') + transpOff + ' st';
}
document.getElementById('tr-up').addEventListener('click', () => { transpOff++; updTransp(); render(); ss((transpOff>0?'+':'')+transpOff+' semitoni'); });
document.getElementById('tr-dn').addEventListener('click', () => { transpOff--; updTransp(); render(); ss((transpOff>0?'+':'')+transpOff+' semitoni'); });
document.getElementById('tr-reset').addEventListener('click', () => { transpOff=0; updTransp(); render(); ss('Trasposizione azzerata'); });

// ═══════════════════════════════════
// PIANO KEYBOARD
// ═══════════════════════════════════
const OCTS = [3, 4, 5];
const WHITE = ['C','D','E','F','G','A','B'];
const BLACK_DEF = [
  { after:0, note:'C', acc:'#' },
  { after:1, note:'D', acc:'#' },
  { after:3, note:'F', acc:'#' },
  { after:4, note:'G', acc:'#' },
  { after:5, note:'A', acc:'#' }
];

function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';
  OCTS.forEach((oct, oi) => {
    if (oi > 0) {
      const sep = document.createElement('div');
      sep.className = 'oct-sep';
      piano.appendChild(sep);
    }
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:flex;flex-shrink:0;';
    WHITE.forEach((note, wi) => {
      const k = document.createElement('div');
      k.className = 'wk';
      const lbl = document.createElement('span');
      lbl.className = 'wl' + (didactic ? ' did' : '');
      lbl.textContent = didactic ? (NI[note] + (note === 'C' ? (oct+1) : '')) : (note + (note === 'C' ? oct : ''));
      k.appendChild(lbl);
      k.addEventListener('pointerdown', e => {
        e.preventDefault();
        getAC();
        const rawMidi = (oct+1)*12 + ({C:0,D:2,E:4,F:5,G:7,A:9,B:11}[note]);
        const midi = rawMidi + transpOff;
        k.classList.add('pr');
        playNote(midi, 0.6);
        if (isRec) recEvents.push({ midi: rawMidi });
        else addN(note, oct, null);
      });
      k.addEventListener('pointerup', () => k.classList.remove('pr'));
      k.addEventListener('pointerleave', () => k.classList.remove('pr'));
      wrap.appendChild(k);
    });
    BLACK_DEF.forEach(bd => {
      const k = document.createElement('div');
      k.className = 'bk';
      k.style.left = (bd.after * 48 + 33) + 'px';
      const rawMidi = (oct+1)*12 + ({C:0,D:2,E:4,F:5,G:7,A:9,B:11}[bd.note]) + 1;
      k.addEventListener('pointerdown', e => {
        e.preventDefault();
        getAC();
        const midi = rawMidi + transpOff;
        k.classList.add('pr');
        playNote(midi, 0.6);
        if (isRec) recEvents.push({ midi: rawMidi });
        else addN(bd.note, oct, bd.acc);
      });
      k.addEventListener('pointerup', () => k.classList.remove('pr'));
      k.addEventListener('pointerleave', () => k.classList.remove('pr'));
      wrap.appendChild(k);
    });
    piano.appendChild(wrap);
  });
}

document.getElementById('btn-piano').addEventListener('click', () => {
  const pw = document.getElementById('pw');
  const showing = pw.classList.toggle('show');
  document.getElementById('btn-piano').classList.toggle('on', showing);
  if (showing) buildPiano();
});

// ═══════════════════════════════════
// QWERTY BAR (visible input field)
// ═══════════════════════════════════
document.getElementById('kb-btn').addEventListener('click', () => {
  const bar = document.getElementById('kb-bar');
  const showing = bar.classList.toggle('show');
  document.getElementById('kb-btn').classList.toggle('on', showing);
  if (showing) {
    setTimeout(() => document.getElementById('kb-input').focus(), 50);
    ss('Tastiera attiva — digita A–G per note, 1/2/4/8/6 per durata');
  }
});

document.getElementById('kb-input').addEventListener('keydown', e => {
  e.stopPropagation();
  const k = e.key.toUpperCase();
  // block default only for note/duration keys to avoid eating all input
  if ('ABCDEFG'.includes(k) || '12468SBLRT'.includes(k) ||
      e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
      e.key === 'Backspace' || e.key === 'Delete' || e.key === 'z' || e.key === 'Z') {
    e.preventDefault();
    kbHandle(e);
  }
});

// iOS fires 'input' for some keys — catch remaining characters
document.getElementById('kb-input').addEventListener('input', e => {
  const val = (document.getElementById('kb-input').value || '').toUpperCase().trim();
  document.getElementById('kb-input').value = '';
  if (!val) return;
  const last = val[val.length - 1];
  if ('ABCDEFG'.includes(last)) { addN(last, S.octave, null); return; }
  const dm = {'1':'whole','2':'half','4':'quarter','8':'eighth','6':'sixteenth'};
  if (dm[last]) setPD(dm[last]);
});

// ═══════════════════════════════════
// MUSIC MATH
// ═══════════════════════════════════
function nd(n) { return DB[n.duration] || 1; }
function n2s(nm, o) { return o*7 + NS[nm]; }
function sY(ri) { return ST0 + ri * (RH + (didactic ? 36 : 0)); }
function s2y(step, ri) { return sY(ri) + SG*2 + (n2s('B',4) - step) * (SG/2); }
function nw(n) { return Math.max(28, nd(n) * 34); }

function y2n(y, ri) {
  const diff = y - (sY(ri) + SG*2);
  const hs = Math.round(diff / (SG/2));
  const step = n2s('B',4) - hs;
  const oct = Math.floor(step / 7);
  const ni = ((step % 7) + 7) % 7;
  return { name:['C','D','E','F','G','A','B'][ni], octave:Math.max(2, Math.min(7, oct)) };
}
function rowAt(y) {
  for (let r = 0; r < 30; r++) {
    const sy = sY(r);
    if (y >= sy - SG*5 && y <= sy + SG*10) return r;
  }
  return 0;
}

function buildRows() {
  const W = SA.clientWidth || 640;
  const bp = bpb();
  const bars = [];
  let bar = [], beats = 0;
  S.notes.forEach((n, i) => {
    const d = nd(n);
    bar.push({ note:n, idx:i });
    beats += d;
    if (Math.abs(beats - bp) < 0.001 || beats > bp) {
      bars.push({ notes:[...bar], beats });
      bar = []; beats = 0;
    }
  });
  if (bar.length) bars.push({ notes:bar, beats });

  const pre = CW + TW + LP + 8;
  const rows = [];
  let rb = [], rw = 0;
  bars.forEach(b => {
    const bw = Math.max(80, b.notes.reduce((s,e) => s + nw(e.note), 0) + 24);
    b._w = bw;
    if (rw + bw + pre > W - 20 && rb.length) {
      rows.push(rb); rb = [b]; rw = bw;
    } else {
      rb.push(b); rw += bw;
    }
  });
  if (rb.length) rows.push(rb);
  if (!rows.length) rows.push([]);
  return rows;
}

function hitN(cx, cy) {
  for (let i = S.notes.length - 1; i >= 0; i--) {
    const n = S.notes[i];
    if (n._x !== undefined && Math.abs(cx - n._x) < 15 && Math.abs(cy - n._y) < 12) return i;
  }
  return -1;
}
function hitDel(cx, cy) {
  return delB && Math.hypot(cx - delB.x, cy - delB.y) <= 14;
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function rrect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function render() {
  const W = SA.clientWidth || 640;
  const rows = buildRows();
  const H = ST0 + rows.length * (RH + (didactic ? 36 : 0)) + 60;
  CV.width = W; CV.height = H;
  CTX.fillStyle = '#fff'; CTX.fillRect(0, 0, W, H);

  // Title
  CTX.fillStyle = '#333'; CTX.font = '500 14px system-ui';
  let title = S.scoreName || 'Spartito';
  if (transpOff !== 0) title += '  [' + (transpOff > 0 ? '+' : '') + transpOff + ' st]';
  CTX.fillText(title, LP + CW + TW, sY(0) - 22);

  rows.forEach((bars, ri) => {
    drawStaff(ri, W);
    drawClef(ri);
    drawTSig(ri);
    let x = LP + CW + TW + 8;
    bars.forEach(bar => {
      drawBar(bar, ri, x);
      x += bar._w || 80;
      CTX.strokeStyle = '#777'; CTX.lineWidth = 0.8;
      CTX.beginPath(); CTX.moveTo(x, sY(ri)); CTX.lineTo(x, sY(ri)+SG*4); CTX.stroke();
    });
    // Final barline
    const ex = W - 16;
    CTX.strokeStyle = '#333'; CTX.lineWidth = 1.8;
    CTX.beginPath(); CTX.moveTo(ex-2, sY(ri)); CTX.lineTo(ex-2, sY(ri)+SG*4); CTX.stroke();
    CTX.lineWidth = 0.5;
    CTX.beginPath(); CTX.moveTo(ex-7, sY(ri)); CTX.lineTo(ex-7, sY(ri)+SG*4); CTX.stroke();
  });

  // Annotations
  drawAnnotations(rows);

  // Ghost note
  if (ghost) {
    CTX.save(); CTX.globalAlpha = 0.25; CTX.fillStyle = '#534AB7';
    CTX.beginPath(); CTX.ellipse(ghost.x, ghost.y, SG*.85, SG*.6, -.22, 0, Math.PI*2); CTX.fill();
    CTX.restore();
  }

  // Delete button
  if (selI !== null && delB) {
    CTX.save();
    CTX.fillStyle = '#E24B4A';
    CTX.beginPath(); CTX.arc(delB.x, delB.y, 12, 0, Math.PI*2); CTX.fill();
    CTX.fillStyle = '#fff'; CTX.font = 'bold 16px system-ui';
    CTX.textAlign = 'center'; CTX.textBaseline = 'middle';
    CTX.fillText('×', delB.x, delB.y + 0.5);
    CTX.textAlign = 'left'; CTX.textBaseline = 'alphabetic';
    CTX.restore();
  }
}

function drawStaff(ri, W) {
  CTX.strokeStyle = '#ccc'; CTX.lineWidth = 0.5;
  const sy = sY(ri);
  for (let l = 0; l < 5; l++) {
    CTX.beginPath(); CTX.moveTo(LP, sy+l*SG); CTX.lineTo(W-16, sy+l*SG); CTX.stroke();
  }
}

function drawClef(ri) {
  const sy = sY(ri); CTX.fillStyle = '#1a1a1a';
  if (S.clef === 'treble') { CTX.font = SG*7.2 + 'px serif'; CTX.fillText('𝄞', LP+2, sy+SG*4.6); }
  else { CTX.font = SG*4.5 + 'px serif'; CTX.fillText('𝄢', LP+2, sy+SG*2.8); }
}

function drawTSig(ri) {
  const sy = sY(ri), x = LP+CW+4;
  const [n, d] = S.timeSig.split('/');
  CTX.fillStyle = '#1a1a1a'; CTX.font = 'bold ' + SG*2 + 'px serif';
  CTX.textAlign = 'center';
  CTX.fillText(n, x+TW/2, sy+SG*2);
  CTX.fillText(d, x+TW/2, sy+SG*4);
  CTX.textAlign = 'left';
}

function drawBar(bar, ri, sx) {
  if (!bar.notes.length) return;
  const pos = [];
  let cx = sx + 14;
  bar.notes.forEach(e => { const w = nw(e.note); pos.push(cx + w/2); cx += w; });
  const beams = getBeams(bar.notes);
  bar.notes.forEach((e, i) => {
    const n = e.note, x = pos[i], sel = e.idx === selI, hl = e.idx === playHL;
    if (n.type === 'rest') {
      drawRest(n, x, ri, sel, hl);
    } else {
      const ny = s2y(n2s(n.name, n.octave), ri);
      n._x = x; n._y = ny; n._ri = ri;
      drawNoteShape(n, x, ny, sel, hl, beams, i, e.idx===lpHighlight);
      drawAcc(n, x, ny);
      drawDyn(n, x, ny);
      drawLedger(x, ny, ri);
      if (didactic) drawLabel(n, x, ri, ny);
      if (sel) {
        CTX.save(); CTX.strokeStyle = '#534AB7'; CTX.lineWidth = 1.8; CTX.setLineDash([3,2]);
        CTX.beginPath(); CTX.arc(x, ny, SG*1.6, 0, Math.PI*2); CTX.stroke();
        CTX.setLineDash([]); CTX.restore();
        delB = { x: x+SG*2, y: ny-SG*2.5 };
      }
    }
  });
  drawBeams(beams, bar.notes, pos);
  drawSlurs(bar.notes, pos, ri);
}

function drawLabel(n, x, ri, noteY) {
  const staffBot = sY(ri) + SG*4;
  const noteBot = noteY + SG;
  const ly = Math.max(staffBot, noteBot) + SG + 10;
  const lbl = (NI[n.name] || n.name) + (n.accidental ? (AI[n.accidental] || '') : '');
  CTX.save(); CTX.font = '600 9.5px system-ui'; CTX.textAlign = 'center';
  const tw = CTX.measureText(lbl).width + 9;
  CTX.fillStyle = '#EEEDFE';
  rrect(CTX, x-tw/2, ly-11, tw, 14, 3); CTX.fill();
  CTX.fillStyle = '#3C3489'; CTX.fillText(lbl, x, ly);
  CTX.textAlign = 'left'; CTX.restore();
}

function getBeams(entries) {
  const g = []; let c = null;
  entries.forEach((e, i) => {
    const d = e.note.duration;
    const ok = d==='eighth' || d==='sixteenth' || d==='dotted_eighth';
    if (ok) { if (!c) c = {indices:[i]}; else c.indices.push(i); }
    else { if (c && c.indices.length >= 2) g.push(c); c = null; }
  });
  if (c && c.indices.length >= 2) g.push(c);
  return g;
}
function inBeam(i, g) { return g.some(x => x.indices.includes(i)); }

function noteCol(sel, hl, lp) {
  if (hl) return '#27AE60';
  if (lp) return '#E24B4A';
  if (sel) return '#534AB7';
  return '#111';
}

function drawNoteShape(n, x, ny, sel, hl, beams, i, lp) {
  const dur = n.duration, filled = dur!=='whole' && dur!=='half', ib = inBeam(i, beams);
  CTX.save();
  CTX.strokeStyle = CTX.fillStyle = noteCol(sel, hl, lp);
  CTX.lineWidth = 1;
  if (filled) {
    CTX.beginPath(); CTX.ellipse(x, ny, SG*.85, SG*.58, -.22, 0, Math.PI*2); CTX.fill();
  } else {
    CTX.lineWidth = 1.2;
    CTX.beginPath(); CTX.ellipse(x, ny, SG*.85, SG*.58, -.22, 0, Math.PI*2); CTX.stroke();
  }
  if (dur==='dotted_quarter' || dur==='dotted_eighth') {
    CTX.beginPath(); CTX.arc(x+SG*1.5, ny-.5, 1.7, 0, Math.PI*2); CTX.fill();
  }
  if (dur !== 'whole') {
    CTX.lineWidth = 1.5;
    CTX.beginPath(); CTX.moveTo(x+SG*.82, ny); CTX.lineTo(x+SG*.82, ny-SG*3.8); CTX.stroke();
    if (!ib) {
      if (dur==='eighth' || dur==='dotted_eighth') {
        CTX.beginPath(); CTX.moveTo(x+SG*.82, ny-SG*3.8); CTX.quadraticCurveTo(x+SG*3.5, ny-SG*2.8, x+SG*1.5, ny-SG*2); CTX.stroke();
      }
      if (dur==='sixteenth') {
        CTX.beginPath(); CTX.moveTo(x+SG*.82, ny-SG*3.8); CTX.quadraticCurveTo(x+SG*3.5, ny-SG*2.8, x+SG*1.5, ny-SG*2); CTX.stroke();
        CTX.beginPath(); CTX.moveTo(x+SG*.82, ny-SG*2.8); CTX.quadraticCurveTo(x+SG*3.5, ny-SG*1.8, x+SG*1.5, ny-SG*1); CTX.stroke();
      }
    }
  }
  CTX.restore();
}

function drawBeams(g, entries, pos) {
  g.forEach(gr => {
    if (gr.indices.length < 2) return;
    const f = gr.indices[0], l = gr.indices[gr.indices.length-1];
    const x1 = pos[f]+SG*.82, x2 = pos[l]+SG*.82;
    const y1 = entries[f].note._y - SG*3.8, y2 = entries[l].note._y - SG*3.8;
    CTX.strokeStyle = '#111'; CTX.lineWidth = SG*.55; CTX.lineCap = 'butt';
    CTX.beginPath(); CTX.moveTo(x1, y1); CTX.lineTo(x2, y2); CTX.stroke();
    if (gr.indices.some(i => entries[i].note.duration === 'sixteenth')) {
      CTX.lineWidth = SG*.48;
      CTX.beginPath(); CTX.moveTo(x1, y1+SG*.72); CTX.lineTo(x2, y2+SG*.72); CTX.stroke();
    }
    CTX.lineCap = 'round';
  });
}

function drawSlurs(entries, pos, ri) {
  entries.forEach((e, i) => {
    const n = e.note;
    if (n.slur==='start' && entries[i+1]) {
      const nx = pos[i+1], y1 = (n._y || sY(ri)+SG*3) + SG*1.3;
      CTX.strokeStyle = '#444'; CTX.lineWidth = 1;
      CTX.beginPath(); CTX.moveTo(pos[i]+4, y1); CTX.quadraticCurveTo((pos[i]+nx)/2, y1+SG*1.6, nx-4, y1); CTX.stroke();
    }
    if (n.tie==='start' && entries[i+1]) {
      const nx = pos[i+1], y1 = (n._y || sY(ri)+SG*2) - SG*1.2;
      CTX.strokeStyle = '#444'; CTX.lineWidth = 1; CTX.setLineDash([3,2]);
      CTX.beginPath(); CTX.moveTo(pos[i]+4, y1); CTX.quadraticCurveTo((pos[i]+nx)/2, y1-SG*1.6, nx-4, y1); CTX.stroke();
      CTX.setLineDash([]);
    }
  });
}

function drawAcc(n, x, ny) {
  if (!n.accidental) return;
  CTX.fillStyle = '#222'; CTX.font = SG*1.6 + 'px serif';
  CTX.fillText(AI[n.accidental] || '', x-SG*2.2, ny+SG*.5);
}

function drawDyn(n, x, ny) {
  if (!n.dynamic) return;
  CTX.fillStyle = '#666'; CTX.font = 'italic ' + SG*1.4 + 'px serif';
  CTX.fillText(n.dynamic, x-4, ny+SG*4.3);
}

function drawLedger(x, ny, ri) {
  const sy = sY(ri), bot = sy+SG*4, top = sy;
  CTX.strokeStyle = '#aaa'; CTX.lineWidth = 0.8;
  if (ny > bot+1) { for (let y=bot+SG; y<=ny+1; y+=SG) { CTX.beginPath(); CTX.moveTo(x-SG,y); CTX.lineTo(x+SG,y); CTX.stroke(); } }
  if (ny < top-1) { for (let y=top-SG; y>=ny-1; y-=SG) { CTX.beginPath(); CTX.moveTo(x-SG,y); CTX.lineTo(x+SG,y); CTX.stroke(); } }
}

function drawRest(n, x, ri, sel, hl) {
  const sy = sY(ri);
  const col = hl ? '#27AE60' : sel ? '#534AB7' : '#222';
  CTX.save(); CTX.fillStyle = col; CTX.strokeStyle = col;
  const d = n.duration;
  if (d==='whole') {
    CTX.fillRect(x-SG*1.2, sy+SG, SG*2.4, SG*.7);
  } else if (d==='half') {
    CTX.lineWidth = 1.5;
    CTX.strokeRect(x-SG*1.2, sy+SG*2, SG*2.4, SG*.7);
  } else if (d==='quarter' || d==='dotted_quarter') {
    CTX.lineWidth = 2; CTX.lineCap = 'round'; CTX.lineJoin = 'round';
    CTX.beginPath();
    CTX.moveTo(x+SG*.5, sy+SG*.4);
    CTX.lineTo(x-SG*.3, sy+SG*1.1);
    CTX.lineTo(x+SG*.7, sy+SG*1.7);
    CTX.lineTo(x-SG*.5, sy+SG*2.7);
    CTX.lineTo(x+SG*.3, sy+SG*3.2);
    CTX.stroke();
    if (d==='dotted_quarter') { CTX.beginPath(); CTX.arc(x+SG*1.3, sy+SG*1.8, 1.8, 0, Math.PI*2); CTX.fill(); }
  } else if (d==='eighth' || d==='dotted_eighth') {
    CTX.beginPath(); CTX.arc(x+SG*.3, sy+SG*.8, SG*.5, 0, Math.PI*2); CTX.fill();
    CTX.lineWidth = 1.8; CTX.lineCap = 'round';
    CTX.beginPath();
    CTX.moveTo(x+SG*.6, sy+SG*1.1);
    CTX.quadraticCurveTo(x+SG*1.5, sy+SG*1.8, x, sy+SG*2.3);
    CTX.lineTo(x-SG*.7, sy+SG*3.2);
    CTX.stroke();
    if (d==='dotted_eighth') { CTX.beginPath(); CTX.arc(x+SG*1.5, sy+SG*.7, 1.8, 0, Math.PI*2); CTX.fill(); }
  } else if (d==='sixteenth') {
    CTX.beginPath(); CTX.arc(x+SG*.3, sy+SG*.6, SG*.45, 0, Math.PI*2); CTX.fill();
    CTX.beginPath(); CTX.arc(x+SG*.1, sy+SG*1.6, SG*.45, 0, Math.PI*2); CTX.fill();
    CTX.lineWidth = 1.6; CTX.lineCap = 'round';
    CTX.beginPath();
    CTX.moveTo(x+SG*.6, sy+SG*.9);
    CTX.quadraticCurveTo(x+SG*1.4, sy+SG*1.4, x, sy+SG*1.9);
    CTX.quadraticCurveTo(x+SG*1.2, sy+SG*2.4, x-SG*.3, sy+SG*3.2);
    CTX.stroke();
  }
  CTX.restore();
  n._x = x; n._y = sy + SG*2;
}

// ═══════════════════════════════════
// EDITING
// ═══════════════════════════════════
function pH() { hist.push(JSON.stringify(S.notes)); if (hist.length > 100) hist.shift(); }

function cycleD(idx) {
  const n = S.notes[idx];
  const ci = DC.indexOf(n.duration);
  n.duration = DC[ci === -1 ? 2 : (ci+1) % DC.length];
  ss((NI[n.name] || 'Nota') + ' → ' + DN[n.duration]);
}

function addN(name, octave, accidental) {
  pH();
  const acc = accidental !== undefined ? accidental : S.accidental;
  const n = { type:'note', name, octave, duration:S.duration, accidental:acc,
    dynamic:S.pendingDyn||null, slur:S.slurStart!==null?'start':null, tie:S.tieStart!==null?'start':null };
  if (S.slurStart !== null) { S.slurStart = null; document.querySelector('[data-a=slur]').classList.remove('active'); }
  if (S.tieStart !== null) { S.tieStart = null; document.querySelector('[data-a=tie]').classList.remove('active'); }
  S.notes.push(n);
  S.accidental = null; S.pendingDyn = null;
  clearAcc(); render(); ss((NI[name]||name) + octave + ' — ' + DN[S.duration]); ur();
  // sound
  const rawMidi = (octave+1)*12 + ({C:0,D:2,E:4,F:5,G:7,A:9,B:11}[name]||0) + (acc==='#'?1:acc==='b'?-1:0);
  playNote(rawMidi + transpOff, (DB[S.duration]||1) * 60/bpm * 0.85);
}

function addR(dur) { pH(); S.notes.push({type:'rest', duration:dur||S.duration}); render(); ur(); }
function delSel() { if (selI===null) return; pH(); S.notes.splice(selI,1); selI=null; delB=null; render(); ur(); }
function undo() { if (!hist.length) return; S.notes=JSON.parse(hist.pop()); selI=null; delB=null; render(); ur(); }
function clearAcc() { document.querySelectorAll('[data-a="acc"]').forEach(b => b.classList.remove('active')); }
function ss(m) { document.getElementById('stl').textContent = m; }
function ur() { document.getElementById('str').textContent = DN[S.duration] + ' | Ott: ' + S.octave + ' | Note: ' + S.notes.length; }

// ═══════════════════════════════════
// CANVAS INTERACTION
// ═══════════════════════════════════
function gxy(e) {
  const r = CV.getBoundingClientRect();
  const sx = CV.width/r.width, sy = CV.height/r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy };
}

CV.addEventListener('mousemove', e => {
  const {x,y} = gxy(e), ri = rowAt(y), {name,octave} = y2n(y,ri);
  ghost = { x, y:s2y(n2s(name,octave),ri) };
  if (mouseDragIdx >= 0) { CV.style.cursor='grabbing'; } else { CV.style.cursor = (hitN(x,y)>=0 || hitDel(x,y)) ? 'pointer' : 'crosshair'; }
  if (hitN(x,y) < 0) ss(NI[name] + octave);
  render();
});


CV.addEventListener('click', e => {
  // On desktop, note adding is handled by mouseup.
  // This handler only manages touch-based cycling (already in touchend)
  // and is the fallback for pointer devices that don't fire mouseup.
  // Skip if mouseup already handled it.
});

let ltI=-1, ltT=0;
CV.addEventListener('touchstart', e => {
  e.preventDefault();
  const {x,y} = gxy(e), now = Date.now();
  if (hitDel(x,y)) { delSel(); return; }
  const hi = hitN(x,y);
  if (hi >= 0) {
    dragIdx = hi;
    dragStartY = y;
    dragSnapY = y;
    dragLastStep = -1;
    dragMoved = false;
    ltI = hi; ltT = now;

    // Start long press timer
    lpIdx = hi;
    lpHighlight = hi;
    render(); // show red tint immediately
    lpTimer = setTimeout(() => {
      if (lpIdx === hi && !dragMoved) {
        // Vibrate if supported
        try { navigator.vibrate && navigator.vibrate(40); } catch(e) {}
        lpHighlight = -1;
        dragIdx = -1;
        lpIdx = -1;
        render();
        // Confirm delete
        if (confirm('Cancellare questa nota?')) {
          pH();
          S.notes.splice(hi, 1);
          selI = null; delB = null;
          render(); ur();
          ss('Nota cancellata');
        }
      }
    }, LP_MS);
    return;
  }
  // Tapped empty space — start long press timer for annotation
  cancelLP();
  if (selI !== null) { selI=null; delB=null; render(); ltI=-1; return; }
  dragIdx = -1; ltI = -1;
  selI = null; delB = null;

  // Long press on empty = annotation
  const emptyX = x, emptyY = y;
  lpTimer = setTimeout(() => {
    try { navigator.vibrate && navigator.vibrate(40); } catch(e) {}
    openAnnotModal(-1, emptyX, emptyY, 'free');
  }, LP_MS);

  // Short tap = add note (timer cancelled in touchend if not long)
  const ri = rowAt(y), {name,octave} = y2n(y,ri);
  // Store for touchend
  ltI = -2; // sentinel: empty tap pending
  ltT = Date.now();
  window._pendingNote = {name, octave};
}, {passive:false});

CV.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragIdx < 0) return;
  const {x,y} = gxy(e);
  const dy = Math.abs(y - dragStartY);
  if (!dragMoved && dy < DRAG_THRESHOLD) return;
  // Cancel long press once finger moves enough
  if (!dragMoved) cancelLP();
  dragMoved = true;

  // Which row is the note on?
  const n = S.notes[dragIdx];
  if (!n || n.type === 'rest') return;

  // Find which row this note is displayed on by checking its stored _ri
  // We use the current y position to determine pitch
  const ri = n._ri !== undefined ? n._ri : rowAt(n._y || y);

  // Map current touch Y to a note, using the note's row
  const noteY = (n._y || dragStartY) + (y - dragStartY);
  const {name, octave} = y2n(noteY, ri);
  const step = n2s(name, octave);

  // Only accept a new pitch when finger has moved at least SG*1.5 px
  // from the last accepted snap — prevents jitter on slow moves
  const distFromSnap = Math.abs(y - dragSnapY);
  if (step !== dragLastStep && distFromSnap >= SG * 2.8) {
    if (!n._dragHistPushed) { pH(); n._dragHistPushed = true; }
    n.name = name;
    n.octave = octave;
    n.accidental = null;
    dragLastStep = step;
    dragSnapY = y; // reset snap origin
    const rawMidi = (octave+1)*12 + ({C:0,D:2,E:4,F:5,G:7,A:9,B:11}[name]||0);
    playNote(rawMidi + transpOff, 0.12);
    render();
    ss('Trascinando: ' + (NI[name]||name) + octave);
  }
}, {passive:false});

CV.addEventListener('touchend', e => {
  e.preventDefault();
  cancelLP(); // cancel long press on finger up

  // Handle pending empty-space tap (ltI===-2)
  if (ltI === -2 && window._pendingNote) {
    const {name, octave} = window._pendingNote;
    window._pendingNote = null;
    ltI = -1;
    addN(name, octave, null);
    return;
  }

  if (dragIdx < 0) return;
  const now = Date.now();
  const hi = dragIdx;
  dragIdx = -1;

  if (S.notes[hi]) delete S.notes[hi]._dragHistPushed;

  if (!dragMoved) {
    // Short tap → cycle duration
    if (selI !== null) { selI=null; delB=null; render(); return; }
    pH(); cycleD(hi); render();
    lcI = hi; lcT = now;
  } else {
    // Drag ended
    ss('Nota spostata');
    render(); ur();
  }
}, {passive:false});

// ── MOUSE DRAG (desktop: Chrome, Edge, Firefox) ──────────────────────
let mouseDragIdx = -1, mouseDragStartY = 0, mouseDragSnapY = 0;
let mouseDragLastStep = -1, mouseDragMoved = false;
let mouseDownPos = null, mouseLPTimer = null;

CV.addEventListener('mousedown', e => {
  const {x,y} = gxy(e);
  if (hitDel(x,y)) { delSel(); return; }
  const hi = hitN(x,y);
  if (hi >= 0) {
    mouseDragIdx = hi;
    mouseDragStartY = y;
    mouseDragSnapY = y;
    mouseDragLastStep = -1;
    mouseDragMoved = false;
    e.preventDefault();
    return;
  }
  // Store click position — note added on mouseup if no drag
  mouseDownPos = {x, y};
  // Long press timer for annotation on empty space
  if (mouseLPTimer) clearTimeout(mouseLPTimer);
  mouseLPTimer = setTimeout(() => {
    mouseLPTimer = null;
    mouseDownPos = null;
    try { navigator.vibrate && navigator.vibrate(40); } catch(e2) {}
    openAnnotModal(-1, x, y, 'free');
  }, LP_MS);
});

CV.addEventListener('mousemove', e => {
  if (mouseDragIdx < 0) return;
  const {x,y} = gxy(e);
  const dy = Math.abs(y - mouseDragStartY);
  if (!mouseDragMoved && dy < DRAG_THRESHOLD) return;
  mouseDragMoved = true;

  const n = S.notes[mouseDragIdx];
  if (!n || n.type === 'rest') return;
  const ri = n._ri !== undefined ? n._ri : rowAt(n._y || y);
  const noteY = (n._y || mouseDragStartY) + (y - mouseDragStartY);
  const {name, octave} = y2n(noteY, ri);
  const step = n2s(name, octave);
  const distFromSnap = Math.abs(y - mouseDragSnapY);

  if (step !== mouseDragLastStep && distFromSnap >= SG * 2.8) {
    if (!n._dragHistPushed) { pH(); n._dragHistPushed = true; }
    n.name = name; n.octave = octave; n.accidental = null;
    mouseDragLastStep = step;
    mouseDragSnapY = y;
    const rawMidi = (octave+1)*12 + ({C:0,D:2,E:4,F:5,G:7,A:9,B:11}[name]||0);
    playNote(rawMidi + transpOff, 0.12);
    render();
    ss('Trascinando: ' + (NI[name]||name) + octave);
  }
  e.preventDefault();
});

CV.addEventListener('mouseup', e => {
  // Cancel long press timer
  if (mouseLPTimer) { clearTimeout(mouseLPTimer); mouseLPTimer = null; }

  // If we were dragging a note
  if (mouseDragIdx >= 0) {
    const hi = mouseDragIdx;
    mouseDragIdx = -1;
    if (S.notes[hi]) delete S.notes[hi]._dragHistPushed;
    if (!mouseDragMoved) {
      // Click on note → check annotation hit first, then cycle
      const {x,y} = gxy(e);
      const annotHit = hitAnnotation(x,y);
      if (annotHit) {
        const a = annotations.find(a=>a.id===annotHit);
        if (a) openAnnotModal(a.noteIdx, a.x||x, a.y||y, a.type, a.id);
        mouseDownPos = null; return;
      }
      pH(); cycleD(hi); render();
    } else {
      ss('Nota spostata'); render(); ur();
    }
    mouseDownPos = null;
    return;
  }

  // Click on empty space → add note on release
  if (mouseDownPos) {
    const {x,y} = mouseDownPos;
    mouseDownPos = null;
    // Check annotation hit
    const annotHit = hitAnnotation(x,y);
    if (annotHit) {
      const a = annotations.find(a=>a.id===annotHit);
      if (a) openAnnotModal(a.noteIdx, a.x||x, a.y||y, a.type, a.id);
      return;
    }
    if (selI !== null) { selI=null; delB=null; render(); return; }
    const ri = rowAt(y), {name,octave} = y2n(y,ri);
    addN(name, octave, null);
  }
});

CV.addEventListener('mouseleave', e => {
  if (mouseLPTimer) { clearTimeout(mouseLPTimer); mouseLPTimer = null; mouseDownPos = null; }
  if (mouseDragIdx >= 0) {
    // Released outside canvas
    if (S.notes[mouseDragIdx]) delete S.notes[mouseDragIdx]._dragHistPushed;
    mouseDragIdx = -1;
    render();
  }
  ghost = null; render();
});

function kbHandle(e) {
  const k = e.key.toUpperCase();
  if (k==='ESCAPE') { selI=null; delB=null; render(); return; }
  if ('ABCDEFG'.includes(k) && k.length===1) { addN(k, S.octave, null); return; }
  if (k==='ARROWUP') { S.octave=Math.min(7,S.octave+1); ur(); return; }
  if (k==='ARROWDOWN') { S.octave=Math.max(2,S.octave-1); ur(); return; }
  const dm = {'1':'whole','2':'half','4':'quarter','8':'eighth','6':'sixteenth'};
  if (dm[e.key]) setPD(dm[e.key]);
  if (k==='S') tAcc('#');
  if (k==='B') tAcc('b');
  if (k==='R') addR(S.duration);
  if (k==='L') startSlur();
  if (k==='T' && e.target === document.body) startTie();
  if (k==='Z') undo();
  if (k==='BACKSPACE'||k==='DELETE') {
    if (selI!==null) delSel();
    else if (S.notes.length) { pH(); S.notes.pop(); render(); ur(); }
  }
}

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT' || e.target.tagName==='SELECT') return;
  if (e.code==='Space') { e.preventDefault(); getAC(); if(isPlay) stopPlay(); else startPlay(); return; }
  kbHandle(e);
});

    const ar=document.createElement('div'); ar.className='slar';

    Object.values(scores).forEach(sc=>{const o=document.createElement('option');o.value=sc.id;o.textContent=sc.name;sel.appendChild(o);});
    const ab=document.createElement('button'); ab.className='sl-add'; ab.textContent='+ Aggiungi';
    ab.addEventListener('click', ()=>{if(!sel.value)return;sl.items.push({scoreId:sel.value});sel.value='';persist();rSLI(sl,iel);});
    ar.appendChild(sel); ar.appendChild(ab); card.appendChild(ar); cont.appendChild(card);
  });

function rSLI(sl, el) {
  el.innerHTML='';
  if(!sl.items.length){el.innerHTML='<p style="font-size:11px;color:#ccc;padding:5px 12px">Nessuno spartito.</p>';return;}
  sl.items.forEach((item,i)=>{
    const sc=scores[item.scoreId], row=document.createElement('div');
    row.className='slrow'; row.draggable=true;
    row.innerHTML='<span class="slnum">'+(i+1)+'.</span><span class="slnm">'+(sc?sc.name:'(eliminato)')+'</span>'+(sc?'<button class="slop" data-sid="'+sc.id+'">Apri</button>':'')+'<span class="slix">✕</span>';
    const ob=row.querySelector('.slop');
    if(ob) ob.addEventListener('click',()=>{loadScore(ob.dataset.sid);document.querySelector('[data-tab=editor]').click();});
    row.querySelector('.slix').addEventListener('click',()=>{sl.items.splice(i,1);persist();rSLI(sl,el);});
    row.addEventListener('dragstart',ev=>{ev.dataTransfer.setData('text/plain',i);});
    row.addEventListener('dragover',ev=>{ev.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',ev=>{
      ev.preventDefault(); row.classList.remove('drag-over');
      const from=parseInt(ev.dataTransfer.getData('text/plain')),to=i;
      if(from===to)return;
      const[moved]=sl.items.splice(from,1); sl.items.splice(to,0,moved);
      persist(); rSLI(sl,el);
    });
    el.appendChild(row);
  });
}

// ═══════════════════════════════════
// PDF
// ═══════════════════════════════════
function expPDF() {
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  pdf.setFont('helvetica','bold'); pdf.setFontSize(14);
  pdf.text((S.scoreName||'Spartito')+(transpOff?'  ['+(transpOff>0?'+':'')+transpOff+' st]':''),15,14);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
  pdf.text(new Date().toLocaleDateString('it-IT'),282,14,{align:'right'});
  const sg=6,left=28,top=28,rowH=didactic?64:48,bp=bpb();
  const bars2=[]; let b2=[],beats2=0;
  S.notes.forEach(n=>{
    b2.push(n); beats2+=nd(n);
    if(Math.abs(beats2-bp)<.001||beats2>bp){bars2.push([...b2]);b2=[];beats2=0;}
  });
  if(b2.length) bars2.push(b2);
  const rb2=[]; let rb=[],rw=0;
  bars2.forEach(bar=>{
    const bw=Math.max(20,bar.length*14+12);
    if(rw+bw>262&&rb.length){rb2.push(rb);rb=[bar];rw=bw;}else{rb.push(bar);rw+=bw;}
  });
  if(rb.length) rb2.push(rb);
  rb2.forEach((rbs,ri)=>{
    const sy=top+ri*rowH;
    pdf.setDrawColor(160); pdf.setLineWidth(0.2);
    for(let l=0;l<5;l++) pdf.line(left-4,sy+l*sg,290,sy+l*sg);
    pdf.setFontSize(20); pdf.setFont('serif','normal');
    try{pdf.text('\u{1D11E}',left-4,sy+sg*3.8);}catch(e){}
    let px=left+12;
    rbs.forEach(bar=>{
      const bw=Math.max(20,bar.length*14+12);
      bar.forEach((n,ni)=>{
        const nx=px+ni*14+7;
        if(n.type==='rest'){
          // draw rest as lines/shapes in PDF
          pdf.setFillColor(20); pdf.setDrawColor(20); pdf.setLineWidth(0.4);
          const rd=n.duration;
          if(rd==='whole'){pdf.rect(nx-sg*.9,sy+sg*.8,sg*1.8,sg*.5,'F');}
          else if(rd==='half'){pdf.rect(nx-sg*.9,sy+sg*1.3,sg*1.8,sg*.5,'D');}
          else{pdf.setFontSize(9);pdf.text('𝄽',nx-2,sy+sg*2.5);}
        } else {
          const chromatic=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
          const base2={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
          let midi=(n.octave+1)*12+(base2[n.name]||0)+(n.accidental==='#'?1:n.accidental==='b'?-1:0)+transpOff;
          const oct2=Math.floor(midi/12)-1, ni2=((midi%12)+12)%12;
          const raw=chromatic[ni2], dn=raw.length===2?raw[0]:raw, da=raw.length===2?'#':null;
          const steps2={C:0,D:1,E:2,F:3,G:4,A:5,B:6};
          const diff=4*7+6-(oct2*7+(steps2[dn]||0));
          const ny2=sy+sg*2+diff*(sg/2);
          const filled2=n.duration!=='whole'&&n.duration!=='half';
          pdf.setDrawColor(20); pdf.setFillColor(20); pdf.setLineWidth(0.3);
          if(filled2)pdf.ellipse(nx,ny2,sg*.7,sg*.5,'F');else pdf.ellipse(nx,ny2,sg*.7,sg*.5,'D');
          if(n.duration!=='whole')pdf.line(nx+sg*.65,ny2,nx+sg*.65,ny2-sg*3);
          if(da){pdf.setFontSize(8);pdf.text('#',nx-sg*1.5,ny2+1);}
          if(didactic){
            const NI2={C:'Do',D:'Re',E:'Mi',F:'Fa',G:'Sol',A:'La',B:'Si'};
            const lb=(NI2[dn]||dn)+(da?'#':'');
            pdf.setFontSize(6.5);pdf.setFont('helvetica','bold');pdf.setTextColor(80,70,180);
            pdf.text(lb,nx,sy+sg*4+5,{align:'center'});
            pdf.setTextColor(0,0,0);pdf.setFont('helvetica','normal');
          }
        }
      });
      px+=bw; pdf.setDrawColor(100); pdf.setLineWidth(0.4); pdf.line(px,sy,px,sy+sg*4);
    });
  });
  pdf.save((S.scoreName||'spartito').replace(/\s+/g,'_')+'.pdf');
  ss('PDF esportato!');
}

let annotModal = document.getElementById('annot-modal');
let annotInput = document.getElementById('annot-input');
let annotPending = null; // {noteIdx, x, y, existing}

function openAnnotModal(noteIdx, x, y, defaultType, existingId) {
  annotPending = {noteIdx, x, y, existingId: existingId||null};
  document.getElementById('annot-title').textContent = existingId ? 'Modifica annotazione' : 'Aggiungi annotazione';
  document.getElementById('annot-delete').style.display = existingId ? 'block' : 'none';

  // Pre-fill if editing
  if (existingId) {
    const a = annotations.find(a=>a.id===existingId);
    if (a) {
      annotInput.value = a.text;
      document.querySelector(`input[name="annot-type"][value="${a.type}"]`).checked = true;
    }
  } else {
    annotInput.value = '';
    const radio = document.querySelector(`input[name="annot-type"][value="${defaultType||'above'}"]`);
    if (radio) radio.checked = true;
  }
  annotModal.style.display = 'flex';
  setTimeout(()=>annotInput.focus(), 80);
}

function closeAnnotModal() {
  annotModal.style.display = 'none';
  annotPending = null;
}

document.getElementById('annot-cancel').addEventListener('click', closeAnnotModal);
annotModal.addEventListener('click', e=>{ if(e.target===annotModal) closeAnnotModal(); });

document.getElementById('annot-ok').addEventListener('click', () => {
  const text = annotInput.value.trim();
  if (!text) { closeAnnotModal(); return; }
  const type = document.querySelector('input[name="annot-type"]:checked').value;
  if (annotPending.existingId) {
    const a = annotations.find(a=>a.id===annotPending.existingId);
    if (a) { a.text=text; a.type=type; }
  } else {
    annotations.push({
      id: 'an_'+Date.now(),
      text, type,
      noteIdx: annotPending.noteIdx,
      x: annotPending.x,
      y: annotPending.y
    });
  }
  closeAnnotModal(); render();
});

document.getElementById('annot-delete').addEventListener('click', () => {
  if (annotPending.existingId) {
    annotations = annotations.filter(a=>a.id!==annotPending.existingId);
  }
  closeAnnotModal(); render();
});

annotInput.addEventListener('keydown', e=>{
  if (e.key==='Enter') document.getElementById('annot-ok').click();
  if (e.key==='Escape') closeAnnotModal();
  e.stopPropagation();
});

// Draw all annotations
function drawAnnotations(rows) {
  rows.forEach((bars, ri) => {
    let noteGlobalIdx = 0;
    // count notes before this row
    rows.slice(0,ri).forEach(rb => rb.forEach(bar => { noteGlobalIdx += bar.notes.length; }));

    bars.forEach(bar => {
      bar.notes.forEach((entry) => {
        const n = entry.note;
        const anns = annotations.filter(a => a.noteIdx === entry.idx);
        anns.forEach(a => {
          if (!n._x) return;
          drawAnnotText(a, n._x, n._y, ri, n);
        });
      });
    });
  });
  // Free-positioned annotations (noteIdx === -1)
  annotations.filter(a=>a.noteIdx===-1).forEach(a=>{
    drawAnnotText(a, a.x, a.y, 0, null);
  });
}

function drawAnnotText(a, nx, ny, ri, n) {
  const sy = sY(ri);
  let tx = nx, ty;
  const isChord = a.type === 'chord';
  const isAbove = a.type === 'above';

  if (isAbove) {
    // Above the note, above the staff top if note is high
    ty = Math.min(ny - SG*1.8, sy - SG*1.2);
  } else if (isChord) {
    // Below staff, below didactic label if present
    const staffBot = sy + SG*4;
    const noteBot = ny + SG;
    const base = Math.max(staffBot, noteBot);
    ty = base + (didactic ? SG+28 : SG+12);
  } else {
    // Free: use stored y
    ty = a.y;
  }

  CTX.save();
  CTX.font = isChord ? 'bold 11px system-ui' : 'italic 10px system-ui';
  CTX.fillStyle = isChord ? '#1a5276' : '#7D6608';
  const tw = CTX.measureText(a.text).width;

  // Background pill
  const pad = 4;
  CTX.fillStyle = isChord ? '#d6eaf8' : '#fef9e7';
  rrect(CTX, tx - tw/2 - pad, ty - 11, tw + pad*2, 14, 3);
  CTX.fill();

  // Border
  CTX.strokeStyle = isChord ? '#2e86c1' : '#d4ac0d';
  CTX.lineWidth = 0.7;
  CTX.stroke();

  // Text
  CTX.fillStyle = isChord ? '#1a5276' : '#7D6608';
  CTX.textAlign = 'center';
  CTX.fillText(a.text, tx, ty);
  CTX.textAlign = 'left';

  // Connector line from annotation to note
  if (n && n._x) {
    CTX.strokeStyle = isChord ? '#aed6f1' : '#f9e79f';
    CTX.lineWidth = 0.8;
    CTX.setLineDash([2,3]);
    CTX.beginPath();
    if (isAbove) { CTX.moveTo(tx, ty+3); CTX.lineTo(n._x, ny-SG*.8); }
    else         { CTX.moveTo(tx, ty-11); CTX.lineTo(n._x, ny+SG*.8); }
    CTX.stroke();
    CTX.setLineDash([]);
  }

  // Store hit area for click/tap detection
  a._hitX = tx; a._hitY = ty; a._hitW = tw + pad*2; a._hitH = 14;
  CTX.restore();
}

function hitAnnotation(cx, cy) {
  for (let i = annotations.length-1; i>=0; i--) {
    const a = annotations[i];
    if (a._hitX===undefined) continue;
    if (cx >= a._hitX - a._hitW/2 && cx <= a._hitX + a._hitW/2 &&
        cy >= a._hitY - 12 && cy <= a._hitY + 3) return a.id;
  }
  return null;
}

// Topbar annota button
document.getElementById('btn-annot-top').addEventListener('click', () => {
  if (selI !== null && S.notes[selI]) {
    const n = S.notes[selI];
    openAnnotModal(selI, n._x||100, n._y||100, 'above');
  } else if (S.notes.length > 0) {
    const last = S.notes[S.notes.length-1];
    openAnnotModal(S.notes.length-1, last._x||100, last._y||100, 'above');
  } else {
    openAnnotModal(-1, 200, 200, 'free');
  }
});

// Palette annotation buttons
document.querySelectorAll('[data-a="annot"]').forEach(btn => {
  btn.addEventListener('click', () => {
    // Use last selected note or cursor position
    if (selI !== null && S.notes[selI]) {
      const n = S.notes[selI];
      openAnnotModal(selI, n._x||100, n._y||100, btn.dataset.v);
    } else if (S.notes.length > 0) {
      const last = S.notes[S.notes.length-1];
      openAnnotModal(S.notes.length-1, last._x||100, last._y||100, btn.dataset.v);
    } else {
      openAnnotModal(-1, 100, 100, btn.dataset.v);
    }
  });
});

// ═══════════════════════════════════
// PERSIST
// ═══════════════════════════════════
function persist() {
  try { localStorage.setItem('sp_sc_v6',JSON.stringify(scores)); localStorage.setItem('sp_sl_v3',JSON.stringify(setlists)); } catch(x) {}
}
function loadP() {
  try {
    // Migrate from any previous version key, oldest to newest
    const SCORE_KEYS = ['sp_sc_v5','sp_sc_v6'];
    const SL_KEYS    = ['sp_sl_v2','sp_sl_v3'];
    const CURRENT_SC = 'sp_sc_v6';
    const CURRENT_SL = 'sp_sl_v3';

    // Load current version first
    const cur = localStorage.getItem(CURRENT_SC);
    if (cur) scores = JSON.parse(cur);
    const curSL = localStorage.getItem(CURRENT_SL);
    if (curSL) setlists = JSON.parse(curSL);

    // Merge in any older versions (don't overwrite existing ids)
    SCORE_KEYS.forEach(key => {
      if (key === CURRENT_SC) return;
      try {
        const old = localStorage.getItem(key);
        if (!old) return;
        const oldData = JSON.parse(old);
        let added = 0;
        Object.entries(oldData).forEach(([id, sc]) => {
          if (!scores[id]) { scores[id] = sc; added++; }
        });
        if (added > 0) {
          persist(); // save merged result
          console.log('Migrated ' + added + ' scores from ' + key);
        }
      } catch(e) {}
    });
    SL_KEYS.forEach(key => {
      if (key === CURRENT_SL) return;
      try {
        const old = localStorage.getItem(key);
        if (!old) return;
        const oldData = JSON.parse(old);
        Object.entries(oldData).forEach(([id, sl]) => {
          if (!setlists[id]) setlists[id] = sl;
        });
      } catch(e) {}
    });
  } catch(x) {}
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
loadP();
rChips();
const ro=new ResizeObserver(()=>render());
ro.observe(SA);
render();
ur();
updTransp();
</script>
